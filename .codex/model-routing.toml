version = 3
as_of = "2026-07-21"
benchmark = "Artificial Analysis Intelligence Index v4.1"
metric_scope = "English text benchmark prior; not local coding-agent success rate"
availability_scope = "Per-surface status; benchmark data is retained even when a dispatch override is unverified"
availability_semantics = "configured means router-permitted, not necessarily smoke-tested; evidence records verification level"

[selection]
default = "balanced"
fast = "fast"
quality_guarded = "quality_guarded"
high_risk = "quality_guarded"

[route_application.roles]
main = "session_start_recommendation"
explore = "dispatch_override"
mech-executor = "dispatch_override"
executor = "dispatch_override"
plan-verifier = "dispatch_override"
verifier = "dispatch_override"
security-reviewer = "dispatch_override"
security-executor = "dispatch_override"

