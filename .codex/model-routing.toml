[quality_floor]
policy = "Meet the role quality tier first; optimize the selected secondary objective only within allowed routes."

[quality_floor.roles]
main = "judgment"
explore = "support"
mech-executor = "support"
executor = "judgment"
plan-verifier = "judgment"
verifier = "critical"
security-reviewer = "critical"
security-executor = "critical"

[quality_floor.allowed]
support = ["gpt-5.6-terra/low", "gpt-5.6-sol/low", "gpt-5.6-sol/medium", "gpt-5.6-sol/high"]
judgment = ["gpt-5.6-sol/medium", "gpt-5.6-sol/high"]
critical = ["gpt-5.6-sol/high"]

[profiles.balanced]
description = "Meet every quality floor, then balance capability, speed, cost, and output tokens."

[profiles.balanced.roles.main]
model = "gpt-5.6-sol"
effort = "medium"
reason = "Balanced integration and synthesis; promote high-risk work explicitly."

[profiles.balanced.roles.explore]
model = "gpt-5.6-sol"
effort = "low"
reason = "Adds capability headroom for broad evidence gathering without raising reasoning effort."

[profiles.balanced.roles.mech-executor]
model = "gpt-5.6-sol"
effort = "low"
reason = "Adds model capability while keeping a complete mechanical specification at low effort."

[profiles.balanced.roles.executor]
model = "gpt-5.6-sol"
effort = "medium"
reason = "Judgment-heavy implementation benefits from Sol while avoiding high-effort overhead."

[profiles.balanced.roles.plan-verifier]
model = "gpt-5.6-sol"
effort = "medium"
reason = "Material plan challenge needs more depth than a scan."

[profiles.balanced.roles.verifier]
model = "gpt-5.6-sol"
effort = "high"
reason = "Independent adversarial verification keeps a high reasoning floor."

[profiles.balanced.roles.security-reviewer]
model = "gpt-5.6-sol"
effort = "high"
reason = "Security review is a trust-boundary task."

[profiles.balanced.roles.security-executor]
model = "gpt-5.6-sol"
effort = "high"
reason = "Security implementation preserves the approved high-reasoning floor."

[profiles.fast]
description = "Fastest route among combinations that meet each role's quality floor."

[profiles.fast.roles.main]
model = "gpt-5.6-sol"
effort = "medium"
reason = "Terra medium is faster but falls below the judgment-role quality floor."

[profiles.fast.roles.explore]
model = "gpt-5.6-terra"
effort = "low"
reason = "Fastest currently dispatchable reconnaissance prior."

[profiles.fast.roles.mech-executor]
model = "gpt-5.6-terra"
effort = "low"
reason = "Fast mechanical execution from a complete specification."

[profiles.fast.roles.executor]
model = "gpt-5.6-sol"
effort = "medium"
reason = "Fastest currently dispatchable route that meets the judgment-role quality floor."

[profiles.fast.roles.plan-verifier]
model = "gpt-5.6-sol"
effort = "medium"
reason = "Plan verification keeps its minimum reasoning floor."

[profiles.fast.roles.verifier]
model = "gpt-5.6-sol"
effort = "high"
reason = "Speed preference does not downgrade an independent high-impact gate."

[profiles.fast.roles.security-reviewer]
model = "gpt-5.6-sol"
effort = "high"
reason = "Speed preference does not lower security review depth."

[profiles.fast.roles.security-executor]
model = "gpt-5.6-sol"
effort = "high"
reason = "Speed preference does not lower security implementation depth."

[profiles.quality_guarded]
description = "Guard high-risk, high-impact, or ambiguity-heavy work without overspending on bounded support roles."

[profiles.quality_guarded.roles.main]
model = "gpt-5.6-sol"
effort = "high"
reason = "Main owns ambiguity resolution, architecture, integration, and final judgment."

[profiles.quality_guarded.roles.explore]
model = "gpt-5.6-sol"
effort = "low"
reason = "Use the stronger model for evidence coverage, but low effort because exploration cannot decide or implement."

[profiles.quality_guarded.roles.mech-executor]
model = "gpt-5.6-sol"
effort = "low"
reason = "A complete specification and stop-on-exception contract provide the quality guard; deeper reasoning is unnecessary."

[profiles.quality_guarded.roles.executor]
model = "gpt-5.6-sol"
effort = "high"
reason = "High-impact local design and implementation need deeper reasoning."

[profiles.quality_guarded.roles.plan-verifier]
